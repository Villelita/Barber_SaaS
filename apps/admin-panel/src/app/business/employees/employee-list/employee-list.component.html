<div class="employee-list-container">
  <header class="header">
    <div class="title-info">
      <h1>Personal de {{ businessName }}</h1>
      <p>Gestiona los accesos y roles de tu equipo.</p>
    </div>
    <button class="btn-primary" (click)="openModal()">
      + Agregar Empleado
    </button>
  </header>

  <div class="employee-grid">
    <div *ngFor="let empleado of empleados" class="employee-card">
      <div class="avatar">{{ empleado.nombre.charAt(0) }}</div>
      <div class="details">
        <h3>{{ empleado.nombre }}</h3>
        <p>{{ empleado.email }}</p>
        <span class="role-badge">{{ empleado.rol }}</span>
      </div>
      <div class="actions">
        <button class="btn-icon">✏️</button>
        <button class="btn-icon danger" (click)="deleteEmployee(empleado.id)">🗑️</button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Agregar Nuevo Empleado a {{ businessName }}</h2>
        <button class="close-btn" (click)="closeModal()">×</button>
      </div>
      
      <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="modal-form">
        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <input id="nombre" type="text" formControlName="nombre" placeholder="Ej: Pedro Armendariz">
          <small class="error" *ngIf="employeeForm.get('nombre')?.invalid && employeeForm.get('nombre')?.touched">
            El nombre es obligatorio.
          </small>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input id="email" type="email" formControlName="email" placeholder="ejemplo@correo.com">
          <small class="error" *ngIf="employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched">
            Ingresa un correo electrónico válido.
          </small>
        </div>

        <div class="form-group">
          <label for="rol">Rol en el Negocio</label>
          <select id="rol" formControlName="rol">
            <option value="EMPLEADO">Barbero / Estilista</option>
            <option value="RECEPCION">Recepción</option>
            <option value="DUENO">Co-Administrador</option>
          </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" (click)="closeModal()">Cancelar</button>
          <button type="submit" class="btn-primary" [disabled]="employeeForm.invalid">Guardar Empleado</button>
        </div>
      </form>
    </div>
  </div>
</div>
