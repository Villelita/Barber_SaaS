<div class="login-container">
  <div class="login-card">
    <div class="brand-header">
      <h2>Barber SaaS</h2>
      <p>Crea tu cuenta de administrador</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="nombreEstetica">Nombre de tu Estética / Barbería</label>
        <input 
          id="nombreEstetica" 
          type="text" 
          formControlName="nombreEstetica" 
          placeholder="Mi Gran Barbería"
          [class.invalid]="registerForm.get('nombreEstetica')?.invalid && registerForm.get('nombreEstetica')?.touched"
        >
        <small class="error-text" *ngIf="registerForm.get('nombreEstetica')?.errors?.['required'] && registerForm.get('nombreEstetica')?.touched">
          El nombre del negocio es obligatorio.
        </small>
      </div>

      <div class="form-group">
        <label for="nombre">Tu Nombre</label>
        <input 
          id="nombre" 
          type="text" 
          formControlName="nombre" 
          placeholder="Juan Pérez"
          [class.invalid]="registerForm.get('nombre')?.invalid && registerForm.get('nombre')?.touched"
        >
        <small class="error-text" *ngIf="registerForm.get('nombre')?.errors?.['required'] && registerForm.get('nombre')?.touched">
          Tu nombre es obligatorio.
        </small>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="admin@miestetica.com"
          [class.invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
        >
        <small class="error-text" *ngIf="registerForm.get('email')?.errors?.['required'] && registerForm.get('email')?.touched">
          El correo es obligatorio.
        </small>
        <small class="error-text" *ngIf="registerForm.get('email')?.errors?.['email'] && registerForm.get('email')?.touched">
          Ingresa un correo válido.
        </small>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
        >
        <small class="error-text" *ngIf="registerForm.get('password')?.errors?.['required'] && registerForm.get('password')?.touched">
          La contraseña es obligatoria.
        </small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input 
          id="confirmPassword" 
          type="password" 
          formControlName="confirmPassword" 
          placeholder="••••••••"
          [class.invalid]="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched"
        >
        <small class="error-text" *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched">
          Las contraseñas no coinciden.
        </small>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="registerForm.invalid || isLoading">
        <span *ngIf="!isLoading">Crear Cuenta</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

      <div class="auth-footer">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
      </div>
    </form>
  </div>
</div>
