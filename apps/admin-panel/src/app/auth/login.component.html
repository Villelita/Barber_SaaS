<div class="login-container">
  <div class="login-card">
    <div class="brand-header">
      <!-- Un tenant dinámico podría sobreescribir este logo o colores desde la DB -->
      <h2>Barber SaaS</h2>
      <p>Panel de Administración</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="admin@miestetica.com"
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
        <small class="error-text" *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched">
          El correo es obligatorio.
        </small>
        <small class="error-text" *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">
          Ingresa un correo válido.
        </small>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
        <small class="error-text" *ngIf="loginForm.get('password')?.errors?.['required'] && loginForm.get('password')?.touched">
          La contraseña es obligatoria.
        </small>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>
    </form>
  </div>
</div>
